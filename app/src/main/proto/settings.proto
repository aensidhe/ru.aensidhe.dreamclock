syntax = "proto3";
option java_package = "ru.aensidhe.dreamclock.settings";
option java_multiple_files = true;

enum Language { FOLLOW_SYSTEM = 0; RU = 1; EN = 2; }
enum ColorRenderModeProto { TEXT_TINT = 0; PANEL_TINT = 1; FULL_SCRIM = 2; ACCENT = 3; }

message Settings {
  Language language = 1;
  bool show_colloquial = 2;
  bool show_seconds = 3;
  bool show_analog_slide = 4;
  ColorRenderModeProto color_render_mode = 5;
  bool photos_enabled = 6;
  string immich_host = 7;
  int32 days_either_side = 8;
  int32 max_empty_years_back = 9;
  int32 photo_interval_seconds = 10;
  int32 shown_every_xth_minute = 11;
  int32 analog_slide_seconds = 13;
  bytes immich_key_ciphertext = 12;
}
